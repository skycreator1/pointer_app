name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
    tags:
      - v*
  workflow_dispatch:

permissions:
  contents: write

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test --coverage
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ github.sha }}
          path: coverage/lcov.info
          retention-days: 14

  build-android:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: Install Android SDK packages
        shell: bash
        run: |
          sdk_root="${ANDROID_SDK_ROOT:-${ANDROID_HOME:-}}"
          if [ -z "$sdk_root" ]; then
            echo "ANDROID_SDK_ROOT/ANDROID_HOME is not set"
            exit 1
          fi
          sdkmanager="$sdk_root/cmdline-tools/latest/bin/sdkmanager"
          if [ ! -x "$sdkmanager" ]; then
            sdkmanager="$sdk_root/cmdline-tools/bin/sdkmanager"
          fi
          if [ ! -x "$sdkmanager" ]; then
            echo "sdkmanager not found under $sdk_root/cmdline-tools"
            exit 1
          fi

          yes | "$sdkmanager" --licenses >/dev/null
          "$sdkmanager" "platforms;android-35" "build-tools;35.0.0"
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - name: Check signing secrets
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          test -n "$ANDROID_KEYSTORE_BASE64" || { echo "Missing secret: ANDROID_KEYSTORE_BASE64"; exit 1; }
          test -n "$ANDROID_KEYSTORE_PASSWORD" || { echo "Missing secret: ANDROID_KEYSTORE_PASSWORD"; exit 1; }
          test -n "$ANDROID_KEY_ALIAS" || { echo "Missing secret: ANDROID_KEY_ALIAS"; exit 1; }
          test -n "$ANDROID_KEY_PASSWORD" || { echo "Missing secret: ANDROID_KEY_PASSWORD"; exit 1; }
      - name: Prepare Android signing
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | tr -d '\n\r' | base64 --decode > android/app/upload-keystore.jks
          test -s android/app/upload-keystore.jks || { echo "Decoded keystore is empty"; exit 1; }
          {
            echo "storePassword=$ANDROID_KEYSTORE_PASSWORD"
            echo "keyPassword=$ANDROID_KEY_PASSWORD"
            echo "keyAlias=$ANDROID_KEY_ALIAS"
            echo "storeType=JKS"
            echo "storeFile=../app/upload-keystore.jks"
          } > android/key.properties
      - name: Verify keystore
        shell: bash
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          keytool -list -keystore android/app/upload-keystore.jks -alias "$ANDROID_KEY_ALIAS" -storepass "$ANDROID_KEYSTORE_PASSWORD"
      - name: Output SHA1 fingerprints
        shell: bash
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          store_type="JKS"
          if [ -f android/key.properties ]; then
            store_type="$(awk -F= '/^storeType=/{print $2; exit}' android/key.properties || true)"
            if [ -z "$store_type" ]; then
              store_type="JKS"
            fi
          fi

          set +e
          release_output="$(keytool -list -v -storetype "$store_type" -keystore android/app/upload-keystore.jks -alias "$ANDROID_KEY_ALIAS" -storepass "$ANDROID_KEYSTORE_PASSWORD" 2>/dev/null)"
          release_rc=$?
          debug_output="$(keytool -list -v -alias androiddebugkey -keystore "$HOME/.android/debug.keystore" -storepass android -keypass android 2>/dev/null)"
          debug_rc=$?
          set -e

          if [ "$release_rc" -ne 0 ]; then
            release_sha1="N/A"
          else
            release_sha1="$(printf '%s\n' "$release_output" | awk -F': ' '/SHA1:/{print $2; exit}')"
            if [ -z "$release_sha1" ]; then release_sha1="N/A"; fi
          fi

          if [ "$debug_rc" -ne 0 ]; then
            debug_sha1="N/A"
          else
            debug_sha1="$(printf '%s\n' "$debug_output" | awk -F': ' '/SHA1:/{print $2; exit}')"
            if [ -z "$debug_sha1" ]; then debug_sha1="N/A"; fi
          fi

          echo "Release SHA1: $release_sha1"
          echo "Debug SHA1:   $debug_sha1"

          {
            echo "## Android SHA1"
            echo ""
            echo "- 发布版（Release）SHA1: $release_sha1"
            echo "- 测试版（Debug）SHA1: $debug_sha1"
          } >> "$GITHUB_STEP_SUMMARY"
      - run: flutter build apk --release -v
      - name: Rename APK for release
        shell: bash
        run: |
          cp build/app/outputs/flutter-apk/app-release.apk "app-release-${{ github.ref_name }}.apk"
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: app-release-${{ github.ref_name }}.apk
          generate_release_notes: true
      - uses: actions/upload-artifact@v4
        with:
          name: app-release-apk-${{ github.ref_name }}
          path: app-release-${{ github.ref_name }}.apk
          retention-days: 14
